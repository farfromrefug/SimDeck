<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light dark" />
    <title>SimDeck Launchpad</title>
    <meta
      name="description"
      content="Launch the SimDeck iOS app, or connect to your local SimDeck server from the browser."
    />
    <link rel="icon" href="/simdeck.png" />
    <link rel="apple-touch-icon" href="/simdeck.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page" data-state="probing">
      <header class="page-header">
        <a class="brand" href="/">
          <img
            class="brand-mark"
            src="/simdeck.png"
            alt=""
            width="32"
            height="32"
          />
          <span class="brand-name">SimDeck</span>
          <span class="brand-tag">Launchpad</span>
        </a>
        <p class="tagline">Remote control iOS simulators from any device.</p>
      </header>

      <section class="card">
        <header class="card-header">
          <h2>Local Server</h2>
        </header>
        <div class="card-body">
          <div class="status">
            <span class="dot" data-status="probing"></span>
            <span id="status">Checking for SimDeck on this Mac…</span>
          </div>
          <p id="error" class="error" hidden></p>
          <div class="actions" data-state="offline">
            <button id="redirect-btn" type="button" class="primary" hidden>
              Open localhost:4310
            </button>
          </div>
          <details>
            <summary>Connect to a remote server</summary>
            <div class="form-row">
              <label for="manual-host">Server address</label>
              <input
                id="manual-host"
                type="text"
                inputmode="url"
                autocomplete="off"
                spellcheck="false"
                placeholder="10.0.0.55:4310 or https://tunnel.example.com"
              />
            </div>
            <button id="manual-connect" type="button" class="primary">
              Connect
            </button>
          </details>
        </div>
      </section>

      <footer class="page-footer">
        <p>
          Need the iOS app?
          <a
            href="https://apps.apple.com/app/simdeck-studio/id6770182703"
            target="_blank"
            rel="noopener"
            >Get it on the App Store</a
          >.
        </p>
        <p class="muted">
          <a
            href="https://github.com/NativeScript/SimDeck"
            target="_blank"
            rel="noopener"
            >SimDeck</a
          >
          is open source.
        </p>
      </footer>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
